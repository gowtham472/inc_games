<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CHESS ARENA</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --yellow: #FFE600;
            --yellow-light: #FFF176;
            --green: #00C853;
            --green-dark: #009624;
            --green-light: #69F0AE;
            --black: #0A0A0A;
            --white: #FAFAFA;
            --gray: #E0E0E0;
            --red: #FF5252;
            --border: 3px solid var(--black);
            --shadow: 6px 6px 0px var(--black);
            --shadow-lg: 10px 10px 0px var(--black);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--yellow);
            background-image: radial-gradient(circle, rgba(0, 0, 0, 0.07) 1px, transparent 1px);
            background-size: 28px 28px;
            min-height: 100vh;
            font-family: 'Space Mono', monospace;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body.clock-mode {
            padding: 0;
            background: var(--black);
            background-image: none;
        }

        #app {
            width: 100%;
            max-width: 580px;
            position: relative;
        }

        body.clock-mode #app {
            max-width: 100%;
            height: 100vh;
            height: 100dvh;
        }

        .card {
            background: var(--white);
            border: var(--border);
            box-shadow: var(--shadow-lg);
            padding: 36px 30px;
            position: relative;
            animation: slideIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        body.clock-mode .card {
            border: none;
            box-shadow: none;
            padding: 0;
            background: transparent;
            height: 100%;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }

            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @keyframes overlayIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .screen-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 42px;
            letter-spacing: 3px;
            color: var(--black);
            line-height: 1;
        }

        .screen-sub {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(0, 0, 0, 0.45);
            margin-top: 6px;
        }

        .label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--black);
            margin-bottom: 8px;
            display: block;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px 14px;
            border: var(--border);
            background: var(--white);
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            outline: none;
            transition: box-shadow 0.15s;
        }

        input:focus {
            box-shadow: 4px 4px 0 var(--green);
        }

        .btn {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 3px;
            padding: 14px 28px;
            border: var(--border);
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            user-select: none;
        }

        .btn:active {
            transform: translate(3px, 3px) !important;
            box-shadow: 0 0 0 var(--black) !important;
        }

        .btn-primary {
            background: var(--green);
            color: var(--black);
            box-shadow: var(--shadow);
        }

        .btn-primary:hover {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0 var(--black);
        }

        .btn-secondary {
            background: var(--yellow);
            color: var(--black);
            box-shadow: 4px 4px 0 var(--black);
        }

        .btn-secondary:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 var(--black);
        }

        .btn-danger {
            background: var(--red);
            color: var(--white);
            box-shadow: 4px 4px 0 var(--black);
        }

        .btn-danger:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 var(--black);
        }

        .btn-small {
            font-size: 14px;
            padding: 8px 16px;
            letter-spacing: 2px;
        }

        .btn-block {
            width: 100%;
        }

        .player-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 16px 0;
            max-height: 260px;
            overflow-y: auto;
        }

        .player-chip {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border: 2px solid var(--black);
            background: var(--yellow-light);
            font-size: 13px;
            font-weight: 700;
            animation: fadeUp 0.2s ease both;
        }

        .player-chip .num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            color: var(--green-dark);
            margin-right: 10px;
            min-width: 28px;
        }

        .player-chip .name {
            flex: 1;
        }

        .player-chip .remove {
            cursor: pointer;
            font-size: 18px;
            color: var(--red);
            font-weight: 700;
            padding: 0 4px;
            border: none;
            background: none;
            font-family: 'Space Mono', monospace;
        }

        .add-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .add-row input {
            flex: 1;
        }

        .format-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 16px 0;
        }

        .format-option {
            border: var(--border);
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            background: var(--white);
            transition: all 0.15s;
            user-select: none;
        }

        .format-option:hover {
            background: var(--yellow-light);
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0 var(--black);
        }

        .format-option.selected {
            background: var(--green);
            box-shadow: var(--shadow);
            transform: translate(-2px, -2px);
        }

        .format-option .fmt-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 2px;
        }

        .format-option .fmt-desc {
            font-size: 9px;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.6;
            margin-top: 4px;
        }

        .time-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }

        .time-pill {
            border: 2px solid var(--black);
            padding: 8px 16px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 2px;
            cursor: pointer;
            background: var(--white);
            transition: all 0.15s;
            user-select: none;
        }

        .time-pill:hover {
            background: var(--yellow-light);
        }

        .time-pill.selected {
            background: var(--green);
            box-shadow: 3px 3px 0 var(--black);
        }

        .custom-time {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 8px;
        }

        .custom-time input {
            width: 70px;
            text-align: center;
        }

        .custom-time span {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .sep {
            height: 3px;
            background: var(--black);
            margin: 24px 0;
        }

        .match-card {
            border: var(--border);
            margin-bottom: 10px;
            overflow: hidden;
            animation: fadeUp 0.25s ease both;
        }

        .match-header {
            background: var(--black);
            color: var(--green);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14px;
            letter-spacing: 3px;
            padding: 6px 14px;
            display: flex;
            justify-content: space-between;
        }

        .match-body {
            display: flex;
            align-items: stretch;
        }

        .match-player {
            flex: 1;
            padding: 14px;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--white);
            transition: background 0.15s;
        }

        .match-vs {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            background: var(--yellow);
            padding: 0 10px;
            display: flex;
            align-items: center;
            border-left: 2px solid var(--black);
            border-right: 2px solid var(--black);
        }

        .match-actions {
            display: flex;
            border-top: 2px solid var(--black);
        }

        .match-actions .btn {
            flex: 1;
            border: none;
            border-radius: 0;
            font-size: 12px;
            padding: 10px;
            letter-spacing: 2px;
        }

        .match-actions .btn+.btn {
            border-left: 2px solid var(--black);
        }

        .match-card.completed .match-player.winner {
            background: var(--green);
        }

        .match-card.completed .match-player.loser {
            opacity: 0.4;
        }

        .match-card.completed .match-player.drawn {
            background: var(--yellow-light);
        }

        .bye-card {
            border: 2px dashed rgba(0, 0, 0, 0.3);
            padding: 12px 14px;
            margin-bottom: 10px;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(0, 0, 0, 0.45);
            text-align: center;
            animation: fadeUp 0.25s ease both;
        }

        /* POINTS TABLE */
        .pts-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }

        .pts-table th {
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 8px 5px;
            text-align: left;
            border-bottom: 2px solid var(--black);
            background: var(--yellow-light);
            font-weight: 700;
        }

        .pts-table td {
            padding: 8px 5px;
            border-bottom: 1px solid var(--gray);
        }

        .pts-table tr.qualified {
            background: var(--green-light);
        }

        .pts-table tr.top-row {
            background: var(--green);
        }

        .pts-table .rank-cell {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
        }

        .pts-table .name-cell {
            font-weight: 700;
        }

        .pts-table .pts-cell {
            font-weight: 700;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
        }

        .pts-table .time-cell {
            font-size: 10px;
            opacity: 0.7;
        }

        .qualify-tag {
            display: inline-block;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 10px;
            letter-spacing: 1px;
            padding: 2px 6px;
            background: var(--green-dark);
            color: var(--white);
            margin-left: 4px;
            vertical-align: middle;
        }

        /* CHESS CLOCK */
        .clock-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .clock-half {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
            position: relative;
        }

        .clock-half.top {
            transform: rotate(180deg);
        }

        .clock-half.inactive {
            opacity: 0.35;
        }

        .clock-half.white-side {
            background: var(--white);
            color: var(--black);
        }

        .clock-half.black-side {
            background: var(--green-dark);
            color: var(--white);
        }

        .clock-half.active-turn {
            opacity: 1;
        }

        .clock-half.active-turn.white-side {
            background: var(--yellow-light);
        }

        .clock-half.active-turn.black-side {
            background: var(--green);
            color: var(--black);
        }

        .clock-half.flagged {
            background: var(--red) !important;
            color: var(--white) !important;
            animation: pulse 0.8s infinite;
        }

        .clock-player-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 4px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .clock-time {
            font-family: 'Space Mono', monospace;
            font-size: 72px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 2px;
        }

        .clock-moves {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 8px;
            opacity: 0.6;
        }

        .clock-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .clock-center-btn {
            width: 56px;
            height: 56px;
            border: 3px solid var(--yellow);
            background: var(--black);
            color: var(--yellow);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .clock-center-btn:hover {
            background: var(--yellow);
            color: var(--black);
        }

        .clock-center-btn svg {
            pointer-events: none;
        }

        .clock-divider {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--yellow);
            transform: translateY(-50%);
            z-index: 5;
            box-shadow: 0 0 12px rgba(255, 230, 0, 0.4);
        }

        .trophy {
            font-size: 80px;
            text-align: center;
            margin: 20px 0;
            animation: pop 0.6s ease;
        }

        .champion-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 52px;
            text-align: center;
            color: var(--green-dark);
            letter-spacing: 4px;
            line-height: 1.1;
        }

        .scroll-area {
            max-height: 55vh;
            overflow-y: auto;
            margin: 12px 0;
            padding-right: 4px;
        }

        .scroll-area::-webkit-scrollbar {
            width: 6px;
        }

        .scroll-area::-webkit-scrollbar-track {
            background: var(--gray);
        }

        .scroll-area::-webkit-scrollbar-thumb {
            background: var(--black);
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .back-btn {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            letter-spacing: 2px;
            cursor: pointer;
            background: none;
            border: 2px solid var(--black);
            padding: 6px 14px;
            transition: all 0.15s;
        }

        .back-btn:hover {
            background: var(--yellow-light);
        }

        .badge {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            padding: 4px 12px;
            background: var(--green);
            border: 2px solid var(--black);
        }

        .increment-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 8px;
        }

        .increment-row input {
            width: 60px;
            text-align: center;
        }

        .increment-row span {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .bracket-round {
            margin-bottom: 24px;
        }

        .round-badge {
            display: inline-block;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 3px;
            padding: 4px 14px;
            background: var(--yellow);
            border: 2px solid var(--black);
            margin-bottom: 10px;
        }

        .round-badge.active {
            background: var(--green);
            box-shadow: 3px 3px 0 var(--black);
        }

        .match-card.current {
            box-shadow: var(--shadow);
            border-color: var(--green-dark);
            border-width: 3px;
        }

        .draw-btn {
            background: var(--yellow) !important;
            color: var(--black) !important;
        }

        .flex-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .flex-row .btn {
            flex: 1;
            min-width: 120px;
        }

        .home-link {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            text-decoration: none;
            color: var(--black);
            border: 2px solid var(--black);
            padding: 4px 12px;
            background: var(--white);
            transition: all 0.15s;
        }

        .home-link:hover {
            background: var(--yellow);
        }

        body.clock-mode .home-link {
            display: none;
        }

        /* CUSTOM MODAL */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 10, 0.65);
            z-index: 9000;
            animation: overlayIn 0.2s ease;
        }

        .modal-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9001;
            background: var(--white);
            border: var(--border);
            box-shadow: var(--shadow-lg);
            padding: 32px 28px;
            max-width: 400px;
            width: 90%;
            animation: modalIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .modal-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 2px;
            color: var(--black);
            margin-bottom: 8px;
        }

        .modal-msg {
            font-size: 12px;
            line-height: 1.6;
            color: rgba(0, 0, 0, 0.65);
            margin-bottom: 20px;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
        }

        .modal-btns .btn {
            flex: 1;
        }

        .hidden {
            display: none !important;
        }

        /* STAGE TABS */
        .stage-tabs {
            display: flex;
            margin-bottom: 16px;
            border: 2px solid var(--black);
            overflow: hidden;
        }

        .stage-tab {
            flex: 1;
            padding: 10px 8px;
            text-align: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            letter-spacing: 2px;
            cursor: pointer;
            background: var(--white);
            border: none;
            transition: all 0.15s;
            user-select: none;
        }

        .stage-tab+.stage-tab {
            border-left: 2px solid var(--black);
        }

        .stage-tab.active {
            background: var(--green);
        }

        .stage-tab.disabled-tab {
            opacity: 0.35;
            cursor: default;
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .card {
                padding: 24px 18px;
            }

            .screen-title {
                font-size: 34px;
            }

            .clock-time {
                font-size: 52px;
            }

            .clock-player-name {
                font-size: 22px;
            }

            .clock-center-btn {
                width: 46px;
                height: 46px;
            }

            .pts-table {
                font-size: 10px;
            }

            .pts-table th {
                font-size: 8px;
                padding: 6px 3px;
            }

            .pts-table td {
                padding: 6px 3px;
            }
        }

        @media (max-height: 600px) and (orientation: landscape) {
            .clock-time {
                font-size: 48px;
            }

            .clock-player-name {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>
    <a href="index.html" class="home-link">← GAMES</a>
    <div id="app"></div>
    <div id="modalRoot"></div>

    <script>
        const $ = s => document.querySelector(s);
        const APP = $('#app');
        const LS_TOURNEY = 'chess_arena_data';
        const LS_NAMES = 'chess_arena_players';

        /* ════════════════════════════════
           MODAL SYSTEM
        ════════════════════════════════ */
        function showModal({ icon, title, message, buttons }) {
            const root = $('#modalRoot');
            root.innerHTML = `
            <div class="modal-overlay" onclick="closeModal()"></div>
            <div class="modal-box">
                ${icon ? `<div class="modal-icon">${icon}</div>` : ''}
                <div class="modal-title">${title}</div>
                <div class="modal-msg">${message}</div>
                <div class="modal-btns" id="modalBtns"></div>
            </div>`;
            const btnContainer = $('#modalBtns');
            buttons.forEach((b, i) => {
                const btn = document.createElement('button');
                btn.className = `btn ${b.cls || 'btn-secondary'} btn-small`;
                btn.textContent = b.label;
                btn.onclick = () => { closeModal(); if (b.action) b.action(); };
                btnContainer.appendChild(btn);
            });
        }

        function closeModal() {
            $('#modalRoot').innerHTML = '';
        }

        function confirmDialog(title, message, icon, onConfirm) {
            showModal({
                icon,
                title,
                message,
                buttons: [
                    { label: 'CANCEL', cls: 'btn-secondary' },
                    { label: 'CONFIRM', cls: 'btn-danger', action: onConfirm }
                ]
            });
        }

        function alertDialog(title, message, icon) {
            showModal({
                icon: icon || '⚠️',
                title,
                message,
                buttons: [{ label: 'OK', cls: 'btn-primary' }]
            });
        }

        /* ════════════════════════════════
           STATE
        ════════════════════════════════ */
        function loadNames() {
            try {
                const d = localStorage.getItem(LS_NAMES);
                return d ? JSON.parse(d) : [];
            } catch (e) { return []; }
        }

        function saveNames(names) {
            try { localStorage.setItem(LS_NAMES, JSON.stringify(names)); } catch (e) { }
        }

        function loadTourney() {
            try {
                const d = localStorage.getItem(LS_TOURNEY);
                return d ? JSON.parse(d) : null;
            } catch (e) { return null; }
        }

        function saveTourney() {
            const s = { ...state, clockState: null };
            try { localStorage.setItem(LS_TOURNEY, JSON.stringify(s)); } catch (e) { }
        }

        let savedNames = loadNames();

        let state = loadTourney() || makeDefaultState();

        function makeDefaultState() {
            return {
                players: savedNames.length > 0 ? [...savedNames] : [],
                format: null,
                timeMinutes: 10,
                incrementSec: 0,
                groupRounds: [],
                playoffRounds: [],
                scores: {},
                viewTab: 'group',
                currentStage: 'group',
                currentRound: 0,
                currentMatch: 0,
                phase: 'setup',
                started: false
            };
        }

        function resetTourney() {
            localStorage.removeItem(LS_TOURNEY);
            state = makeDefaultState();
            // Keep player names from persistent storage
            state.players = loadNames();
            render();
        }

        function clearAllPlayers() {
            state.players = [];
            saveNames([]);
            saveTourney();
            render();
        }

        /* ════════════════════════════════
           RENDER ROUTER
        ════════════════════════════════ */
        function render() {
            document.body.classList.remove('clock-mode');
            switch (state.phase) {
                case 'setup': renderSetup(); break;
                case 'format': renderFormat(); break;
                case 'fixtures': renderFixtures(); break;
                case 'standings': renderStandings(); break;
                case 'clock': renderClock(); break;
                case 'result': renderResult(); break;
                case 'champion': renderChampion(); break;
                default: renderSetup();
            }
        }

        /* ════════════════════════════════
           SCREEN 1: PLAYER SETUP
        ════════════════════════════════ */
        function renderSetup() {

        <div class="card">

          <div class="sep"></div>
          <button class="btn btn-primary btn-block" onclick="generateTournament()"

            const times = [1, 3, 5, 10, 15, 30];
            const container = $('#timeOptions');
            times.forEach(t => {

                pill.textContent = `${t} MIN`;
                pill.onclick = () => { state.timeMinutes = t; saveTourney(); render(); };
                container.appendChild(pill);

        }

        function pickFormat(f) {
            state.format = f;
            saveTourney();
            render();
        }

        function pickCustomTime() {
            const v = parseInt($('#customMin').value) || 10;
            state.timeMinutes = Math.max(1, Math.min(180, v));
            saveTourney();
            render();
        }

        /* ════════════════════════════════
           TOURNAMENT GENERATION
        ════════════════════════════════ */
        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function generateTournament() {
            if (!state.format) return;
            const players = shuffle([...state.players]);

            // Init scores for all players
            state.scores = {};
            state.players.forEach(p => {
                state.scores[p] = { gp: 0, w: 0, d: 0, l: 0, pts: 0, timeUsed: 0 };
            });

            if (state.format === 'knockout') {
                state.groupRounds = [];
                state.playoffRounds = buildKnockoutRounds(players);
                state.currentStage = 'playoff';
                state.viewTab = 'playoff';
            } else if (state.format === 'top2' || state.format === 'top3' || state.format === 'top4') {
                state.groupRounds = buildRoundRobin(players);
                state.playoffRounds = [];
                state.currentStage = 'group';
                state.viewTab = 'group';
            } else if (state.format === 'roundrobin') {
                state.groupRounds = buildRoundRobin(players);
                state.playoffRounds = [];
                state.currentStage = 'group';
                state.viewTab = 'group';
            }

            state.currentRound = 0;
            state.currentMatch = 0;
            state.phase = 'fixtures';
            state.started = true;
            saveTourney();
            render();
        }

        function buildKnockoutRounds(players) {
            const n = players.length;
            let size = 1;
            while (size < n) size *= 2;

            const padded = [...players];
            while (padded.length < size) padded.push(null);

            const rounds = [];
            const matches = [];
            for (let i = 0; i < padded.length; i += 2) {
                const isBye = padded[i + 1] === null;
                matches.push({
                    p1: padded[i],
                    p2: padded[i + 1],
                    winner: isBye ? padded[i] : null,
                    isBye,
                    time1Used: 0,
                    time2Used: 0
                });
            }

            const roundNames = getKnockoutRoundNames(Math.log2(size));
            rounds.push({ name: roundNames[0], matches });

            let mCount = matches.length;
            for (let r = 1; mCount > 1; r++) {
                mCount = Math.floor(mCount / 2);
                const rm = [];
                for (let i = 0; i < mCount; i++) {
                    rm.push({ p1: null, p2: null, winner: null, isBye: false, time1Used: 0, time2Used: 0 });
                }
                rounds.push({ name: roundNames[r] || `ROUND ${r + 1}`, matches: rm });
            }

            return rounds;
        }

        function getKnockoutRoundNames(totalRounds) {
            const names = [];
            for (let i = 0; i < totalRounds; i++) {
                const remaining = totalRounds - i;
                if (remaining === 1) names.push('FINAL');
                else if (remaining === 2) names.push('SEMI-FINALS');
                else if (remaining === 3) names.push('QUARTER-FINALS');
                else names.push(`ROUND ${i + 1}`);
            }
            return names;
        }

        function buildRoundRobin(players) {
            const rounds = [];
            const list = [...players];
            if (list.length % 2 !== 0) list.push(null);
            const numRounds = list.length - 1;
            const half = list.length / 2;

            for (let r = 0; r < numRounds; r++) {
                const matches = [];
                for (let i = 0; i < half; i++) {
                    const p1 = list[i];
                    const p2 = list[list.length - 1 - i];
                    if (p1 === null || p2 === null) {
                        const real = p1 || p2;
                        if (real) matches.push({ p1: real, p2: null, winner: real, isBye: true, time1Used: 0, time2Used: 0 });
                    } else {
                        matches.push({ p1, p2, winner: null, isBye: false, time1Used: 0, time2Used: 0 });
                    }
                }
                rounds.push({ name: `ROUND ${r + 1}`, matches });
                list.splice(1, 0, list.pop());
            }
            return rounds;
        }

        /* ════════════════════════════════
           POINTS TABLE
        ════════════════════════════════ */
        function computeScores() {
            // Reset
            state.players.forEach(p => {
                if (!state.scores[p]) state.scores[p] = { gp: 0, w: 0, d: 0, l: 0, pts: 0, timeUsed: 0 };
                else Object.assign(state.scores[p], { gp: 0, w: 0, d: 0, l: 0, pts: 0, timeUsed: 0 });
            });

            const rounds = state.groupRounds;
            rounds.forEach(r => {
                r.matches.forEach(m => {
                    if (m.isBye || !m.winner) return;
                    const s1 = state.scores[m.p1];
                    const s2 = m.p2 ? state.scores[m.p2] : null;
                    if (s1) {
                        s1.gp++;
                        s1.timeUsed += (m.time1Used || 0);
                    }
                    if (s2) {
                        s2.gp++;
                        s2.timeUsed += (m.time2Used || 0);
                    }
                    if (m.winner === 'DRAW') {
                        if (s1) { s1.d++; s1.pts += 0.5; }
                        if (s2) { s2.d++; s2.pts += 0.5; }
                    } else {
                        const winScore = m.winner === m.p1 ? s1 : s2;
                        const loseScore = m.winner === m.p1 ? s2 : s1;
                        if (winScore) { winScore.w++; winScore.pts += 1; }
                        if (loseScore) { loseScore.l++; }
                    }
                });
            });
        }

        function getSortedStandings() {
            computeScores();
            return Object.entries(state.scores)
                .filter(([name]) => state.players.includes(name))
                .sort((a, b) => {
                    if (b[1].pts !== a[1].pts) return b[1].pts - a[1].pts;
                    if (b[1].w !== a[1].w) return b[1].w - a[1].w;
                    return a[1].timeUsed - b[1].timeUsed; // less time used = better tiebreak
                });
        }

        function renderPointsTableHTML(qualifyCount) {
            const standings = getSortedStandings();
            let html = `
        <table class="pts-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Player</th>
              <th>GP</th>
              <th>W</th>
              <th>D</th>
              <th>L</th>
              <th>Pts</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody>`;
            standings.forEach(([name, s], i) => {
                const isQ = qualifyCount > 0 && i < qualifyCount;
                const cls = i === 0 ? 'top-row' : (isQ ? 'qualified' : '');
                html += `
            <tr class="${cls}">
              <td class="rank-cell">${i + 1}</td>
              <td class="name-cell">${esc(name)}${isQ ? '<span class="qualify-tag">Q</span>' : ''}</td>
              <td>${s.gp}</td>
              <td>${s.w}</td>
              <td>${s.d}</td>
              <td>${s.l}</td>
              <td class="pts-cell">${s.pts}</td>
              <td class="time-cell">${formatTimeSec(s.timeUsed)}</td>
            </tr>`;
            });
            html += '</tbody></table>';
            return html;
        }

        function formatTimeSec(ms) {
            if (!ms || ms <= 0) return '—';
            const totalSec = Math.round(ms / 1000);
            const m = Math.floor(totalSec / 60);
            const s = totalSec % 60;
            return `${m}:${String(s).padStart(2, '0')}`;
        }

        /* ════════════════════════════════
           SCREEN 3: FIXTURES VIEW
        ════════════════════════════════ */
        function renderFixtures() {
            const hasGroup = state.format !== 'knockout';
            const hasPlayoff = state.format !== 'roundrobin';
            const groupDone = state.groupRounds.length > 0 && state.groupRounds.every(r => r.matches.every(m => m.winner));
            const playoffExists = state.playoffRounds.length > 0;
            const playoffDone = playoffExists && state.playoffRounds.every(r => r.matches.every(m => m.winner));

            // Determine qualify count for badges
            let qualifyCount = 0;
            if (state.format === 'top2') qualifyCount = 2;
            else if (state.format === 'top3') qualifyCount = Math.min(3, state.players.length);
            else if (state.format === 'top4') qualifyCount = Math.min(4, state.players.length);

            // Auto-generate playoffs when group is done and playoffs not yet made
            if (hasGroup && hasPlayoff && groupDone && !playoffExists) {
                generatePlayoffsFromGroup();
            }

            const showingGroup = state.viewTab === 'group';
            const rounds = showingGroup ? state.groupRounds : state.playoffRounds;

            // Check if entire tournament is done
            const allDone = (state.format === 'roundrobin' && groupDone)
                || (state.format === 'knockout' && playoffDone)
                || ((state.format === 'top2' || state.format === 'top3' || state.format === 'top4') && playoffDone);

            const formatLabel = {
                knockout: 'KNOCKOUT',
                top3: 'TOP 3 PLAYOFF',
                top2: 'TOP 2 PLAYOFF',
                top4: 'TOP 4 PLAYOFF',
                roundrobin: 'ROUND ROBIN'
            }[state.format];

            APP.innerHTML = `
        <div class="card">
          <div class="top-nav">
            <button class="back-btn" onclick="onResetTourney()">← RESET</button>
            <span class="badge">${formatLabel}</span>
          </div>
          <div class="screen-title">FIXTURES</div>
          <div class="screen-sub">${state.timeMinutes}+${state.incrementSec} · ${state.players.length} Players</div>

          ${hasGroup && hasPlayoff ? `
          <div class="stage-tabs">
            <button class="stage-tab ${state.viewTab === 'group' ? 'active' : ''}" onclick="switchTab('group')">GROUP STAGE</button>
            <button class="stage-tab ${state.viewTab === 'standings' ? 'active' : ''} ${!groupDone && state.viewTab !== 'standings' ? '' : ''}" onclick="switchTab('standings')">STANDINGS</button>
            <button class="stage-tab ${state.viewTab === 'playoff' ? 'active' : ''} ${!playoffExists ? 'disabled-tab' : ''}" onclick="${playoffExists ? "switchTab('playoff')" : ''}">PLAYOFFS</button>
          </div>
          ` : (hasGroup && !hasPlayoff ? `
          <div class="stage-tabs">
            <button class="stage-tab ${state.viewTab === 'group' ? 'active' : ''}" onclick="switchTab('group')">MATCHES</button>
            <button class="stage-tab ${state.viewTab === 'standings' ? 'active' : ''}" onclick="switchTab('standings')">STANDINGS</button>
          </div>
          ` : '')}

          <div class="sep"></div>

          ${state.viewTab === 'standings' ? renderStandingsInline(qualifyCount, groupDone) : ''}

          ${state.viewTab !== 'standings' ? `<div class="scroll-area" id="fixtureArea"></div>` : ''}

          ${allDone ? `
            <div class="sep"></div>
            <button class="btn btn-primary btn-block" onclick="goChampion()">VIEW CHAMPION →</button>
          ` : ''}
        </div>`;

            if (state.viewTab !== 'standings') {
                const area = $('#fixtureArea');
                if (area) renderMatchList(area, rounds, showingGroup);
            }
        }

        function renderStandingsInline(qualifyCount, groupDone) {
            const ptHTML = renderPointsTableHTML(qualifyCount);
            let extra = '';
            if (qualifyCount > 0 && groupDone && state.playoffRounds.length > 0) {
                extra = `<div style="margin-top:12px;text-align:center;">
                <button class="btn btn-primary btn-small" onclick="switchTab('playoff')">VIEW PLAYOFFS →</button>
            </div>`;
            }
            return `<div class="scroll-area">${ptHTML}</div>${extra}`;
        }

        function switchTab(tab) {
            state.viewTab = tab;
            saveTourney();
            render();
        }

        function renderMatchList(area, rounds, allowDraw) {
            if (!rounds || rounds.length === 0) {
                area.innerHTML = '<div class="bye-card">NO MATCHES YET</div>';
                return;
            }

            rounds.forEach((round, ri) => {
                const div = document.createElement('div');
                div.className = 'bracket-round';
                const isActive = isRoundActive(rounds, ri);
                div.innerHTML = `<div class="round-badge ${isActive ? 'active' : ''}">${round.name}</div>`;

                round.matches.forEach((m, mi) => {
                    if (m.isBye) {
                        const bye = document.createElement('div');
                        bye.className = 'bye-card';
                        bye.textContent = `${m.p1 || '?'} — BYE (advances)`;
                        div.appendChild(bye);
                        return;
                    }

                    const isCurrent = isActive && !m.winner && isNextMatchInRound(rounds, ri, mi);
                    const mc = document.createElement('div');
                    mc.className = `match-card ${m.winner ? 'completed' : ''} ${isCurrent ? 'current' : ''}`;

                    let p1Class = '', p2Class = '';
                    if (m.winner === 'DRAW') { p1Class = 'drawn'; p2Class = 'drawn'; }
                    else if (m.winner === m.p1) { p1Class = 'winner'; p2Class = 'loser'; }
                    else if (m.winner === m.p2) { p1Class = 'loser'; p2Class = 'winner'; }

                    const stageKey = (rounds === state.groupRounds) ? 'group' : 'playoff';

                    mc.innerHTML = `
                <div class="match-header">
                    <span>MATCH ${mi + 1}</span>
                    <span>${m.winner ? '✓ DONE' : (isCurrent ? '● NEXT' : '—')}</span>
                </div>
                <div class="match-body">
                    <div class="match-player ${p1Class}">${m.p1 ? esc(m.p1) : 'TBD'}</div>
                    <div class="match-vs">VS</div>
                    <div class="match-player ${p2Class}">${m.p2 ? esc(m.p2) : 'TBD'}</div>
                </div>
                ${isCurrent && m.p1 && m.p2 ? `
                <div class="match-actions">
                    <button class="btn btn-primary" onclick="startMatch('${stageKey}',${ri},${mi})">⏱ CLOCK</button>
                    <button class="btn btn-secondary" onclick="quickResult('${stageKey}',${ri},${mi},'p1')">${esc(m.p1)}</button>
                    ${allowDraw ? `<button class="btn draw-btn" onclick="quickResult('${stageKey}',${ri},${mi},'draw')">½</button>` : ''}
                    <button class="btn btn-secondary" onclick="quickResult('${stageKey}',${ri},${mi},'p2')">${esc(m.p2)}</button>
                </div>
                ` : ''}`;
                    div.appendChild(mc);
                });

                area.appendChild(div);
            });
        }

        function isRoundActive(rounds, ri) {
            for (let r = 0; r < ri; r++) {
                if (rounds[r].matches.some(m => !m.winner && !m.isBye)) return false;
            }
            return rounds[ri].matches.some(m => !m.winner && !m.isBye);
        }

        function isNextMatchInRound(rounds, ri, mi) {
            for (let i = 0; i < rounds[ri].matches.length; i++) {
                const m = rounds[ri].matches[i];
                if (!m.winner && !m.isBye) return i === mi;
            }
            return false;
        }

        function onResetTourney() {
            confirmDialog(
                'RESET TOURNAMENT',
                'All tournament progress will be lost. Your player names will be kept. Continue?',
                '🔄',
                resetTourney
            );
        }

        /* ════════════════════════════════
           MATCH ACTIONS
        ════════════════════════════════ */
        function getRounds(stageKey) {
            return stageKey === 'group' ? state.groupRounds : state.playoffRounds;
        }

        function startMatch(stageKey, ri, mi) {
            state.currentStage = stageKey;
            state.currentRound = ri;
            state.currentMatch = mi;
            state.phase = 'clock';
            saveTourney();
            render();
        }

        function quickResult(stageKey, ri, mi, result) {
            const rounds = getRounds(stageKey);
            const m = rounds[ri].matches[mi];
            if (result === 'p1') m.winner = m.p1;
            else if (result === 'p2') m.winner = m.p2;
            else m.winner = 'DRAW';

            if (stageKey === 'playoff') advanceKnockout(ri, mi);
            checkGroupComplete();
            saveTourney();
            render();
        }

        function advanceKnockout(ri, mi) {
            const rounds = state.playoffRounds;
            const match = rounds[ri].matches[mi];
            if (!match.winner || match.winner === 'DRAW') return;

            if (ri + 1 < rounds.length) {
                const nextMatch = rounds[ri + 1].matches[0];
                if (state.format === 'top3') {
                    // In top3, semi winner goes to p2 of final (#1 is already p1)
                    nextMatch.p2 = match.winner;
                } else {
                    const nextMatchIdx = Math.floor(mi / 2);
                    const nm = rounds[ri + 1].matches[nextMatchIdx];
                    if (mi % 2 === 0) nm.p1 = match.winner;
                    else nm.p2 = match.winner;
                }
            }
        }

        function checkGroupComplete() {
            if (state.format === 'knockout' || state.format === 'roundrobin') return;
            const groupDone = state.groupRounds.every(r => r.matches.every(m => m.winner));
            if (groupDone && state.playoffRounds.length === 0) {
                generatePlayoffsFromGroup();
            }
        }

        function generatePlayoffsFromGroup() {
            const standings = getSortedStandings();
            let qualifyCount;
            if (state.format === 'top2') qualifyCount = 2;
            else if (state.format === 'top3') qualifyCount = Math.min(3, state.players.length);
            else qualifyCount = Math.min(4, state.players.length);
            const qualified = standings.slice(0, qualifyCount).map(([name]) => name);

            if (qualifyCount === 2) {
                // Final only
                state.playoffRounds = [{
                    name: 'FINAL',
                    matches: [{
                        p1: qualified[0], p2: qualified[1],
                        winner: null, isBye: false, time1Used: 0, time2Used: 0
                    }]
                }];
            } else if (state.format === 'top3') {
                // #1 goes to Final directly, #2 vs #3 in Semi
                state.playoffRounds = [
                    {
                        name: 'SEMI-FINAL',
                        matches: [
                            { p1: qualified[1], p2: qualified[2], winner: null, isBye: false, time1Used: 0, time2Used: 0 }
                        ]
                    },
                    {
                        name: 'FINAL',
                        matches: [
                            { p1: qualified[0], p2: null, winner: null, isBye: false, time1Used: 0, time2Used: 0 }
                        ]
                    }
                ];
            } else {
                // Semi-finals + Final (top4)
                state.playoffRounds = [
                    {
                        name: 'SEMI-FINALS',
                        matches: [
                            { p1: qualified[0], p2: qualified[3], winner: null, isBye: false, time1Used: 0, time2Used: 0 },
                            { p1: qualified[1], p2: qualified[2], winner: null, isBye: false, time1Used: 0, time2Used: 0 }
                        ]
                    },
                    {
                        name: 'FINAL',
                        matches: [
                            { p1: null, p2: null, winner: null, isBye: false, time1Used: 0, time2Used: 0 }
                        ]
                    }
                ];
            }

            state.viewTab = 'playoff';
            saveTourney();
        }

        /* ════════════════════════════════
           STANDINGS SCREEN
        ════════════════════════════════ */
        function renderStandings() {
            // This is used if phase === 'standings' (fallback)
            state.phase = 'fixtures';
            state.viewTab = 'standings';
            saveTourney();
            render();
        }

        function goChampion() {
            state.phase = 'champion';
            saveTourney();
            render();
        }

        /* ════════════════════════════════
           CHESS CLOCK (DGT)
        ════════════════════════════════ */
        let clockInterval = null;
        let clockData = null;

        function renderClock() {
            document.body.classList.add('clock-mode');
            const rounds = getRounds(state.currentStage);
            const m = rounds[state.currentRound].matches[state.currentMatch];

            if (!clockData) {
                const totalMs = state.timeMinutes * 60 * 1000;
                clockData = {
                    p1: m.p1,
                    p2: m.p2,
                    time1: totalMs,
                    time2: totalMs,
                    initial: totalMs,
                    turn: null,
                    running: false,
                    moves1: 0,
                    moves2: 0,
                    flagged: null,
                    increment: state.incrementSec * 1000
                };
            }

            APP.innerHTML = `
        <div class="card">
          <div class="clock-container">
            <div class="clock-half top black-side ${clockData.turn === 2 ? 'active-turn' : 'inactive'} ${clockData.flagged === 2 ? 'flagged' : ''}"
                 id="topHalf" onclick="clockTap(2)">
              <div class="clock-player-name">${esc(clockData.p2)}</div>
              <div class="clock-time" id="time2">${formatClockTime(clockData.time2)}</div>
              <div class="clock-moves">${clockData.moves2} MOVES</div>
            </div>
            <div class="clock-divider"></div>
            <div class="clock-center">
              <button class="clock-center-btn" id="pauseBtn" onclick="togglePause()" title="Pause/Resume">
                ${clockData.running ? pauseIcon() : playIcon()}
              </button>
              <button class="clock-center-btn" onclick="endClockMatch()" title="End Match">
                ${stopIcon()}
              </button>
            </div>
            <div class="clock-half bottom white-side ${clockData.turn === 1 ? 'active-turn' : 'inactive'} ${clockData.flagged === 1 ? 'flagged' : ''}"
                 id="bottomHalf" onclick="clockTap(1)">
              <div class="clock-player-name">${esc(clockData.p1)}</div>
              <div class="clock-time" id="time1">${formatClockTime(clockData.time1)}</div>
              <div class="clock-moves">${clockData.moves1} MOVES</div>
            </div>
          </div>
        </div>`;
        }

        function clockTap(player) {
            if (clockData.flagged) return;

            if (clockData.turn === null) {
                clockData.turn = player === 1 ? 2 : 1;
                clockData.running = true;
                if (player === 1) clockData.moves1++;
                else clockData.moves2++;
                startClockInterval();
                requestWakeLock();
                render();
                return;
            }

            if (!clockData.running) return;
            if (clockData.turn !== player) return;

            if (clockData.increment > 0) {
                if (player === 1) clockData.time1 += clockData.increment;
                else clockData.time2 += clockData.increment;
            }

            if (player === 1) { clockData.moves1++; clockData.turn = 2; }
            else { clockData.moves2++; clockData.turn = 1; }

            render();
        }

        function startClockInterval() {
            if (clockInterval) clearInterval(clockInterval);
            let lastTick = performance.now();
            clockInterval = setInterval(() => {
                if (!clockData || !clockData.running || clockData.flagged) return;
                const now = performance.now();
                const delta = now - lastTick;
                lastTick = now;

                if (clockData.turn === 1) {
                    clockData.time1 -= delta;
                    if (clockData.time1 <= 0) {
                        clockData.time1 = 0;
                        clockData.flagged = 1;
                        clockData.running = false;
                        clearInterval(clockInterval);
                        render();
                        return;
                    }
                    const el = $('#time1');
                    if (el) el.textContent = formatClockTime(clockData.time1);
                } else if (clockData.turn === 2) {
                    clockData.time2 -= delta;
                    if (clockData.time2 <= 0) {
                        clockData.time2 = 0;
                        clockData.flagged = 2;
                        clockData.running = false;
                        clearInterval(clockInterval);
                        render();
                        return;
                    }
                    const el = $('#time2');
                    if (el) el.textContent = formatClockTime(clockData.time2);
                }
            }, 50);
        }

        function togglePause() {
            if (clockData.flagged) return;
            if (clockData.turn === null) return;
            clockData.running = !clockData.running;
            if (clockData.running) startClockInterval();
            else clearInterval(clockInterval);
            render();
        }

        function endClockMatch() {
            clearInterval(clockInterval);
            clockInterval = null;
            state.phase = 'result';
            saveTourney();
            render();
        }

        function formatClockTime(ms) {
            if (ms <= 0) return '0:00.0';
            const totalSec = Math.floor(ms / 1000);
            const tenths = Math.floor((ms % 1000) / 100);
            const mins = Math.floor(totalSec / 60);
            const secs = totalSec % 60;
            if (mins < 1) return `0:${String(secs).padStart(2, '0')}.${tenths}`;
            return `${mins}:${String(secs).padStart(2, '0')}`;
        }

        function playIcon() {
            return `<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>`;
        }
        function pauseIcon() {
            return `<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
        }
        function stopIcon() {
            return `<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>`;
        }

        /* ════════════════════════════════
           RESULT SELECTION
        ════════════════════════════════ */
        function renderResult() {
            const rounds = getRounds(state.currentStage);
            const m = rounds[state.currentRound].matches[state.currentMatch];
            const flagged = clockData ? clockData.flagged : null;
            const allowDraw = (state.currentStage === 'group');

            APP.innerHTML = `
        <div class="card">
          <div class="screen-title">MATCH RESULT</div>
          <div class="screen-sub">${esc(m.p1)} vs ${esc(m.p2)}</div>
          ${flagged ? `<div style="margin-top:12px;padding:10px;border:2px solid var(--red);background:#FFF3F3;font-size:12px;letter-spacing:1px;text-transform:uppercase;text-align:center;">
            ⏰ ${flagged === 1 ? esc(m.p1) : esc(m.p2)} FLAGGED (TIME OUT)
          </div>` : ''}
          ${clockData ? `<div style="margin:12px 0;display:flex;gap:10px;justify-content:center;">
            <div style="text-align:center;padding:12px 20px;border:2px solid var(--black);background:var(--white);">
              <div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:0.5;">${esc(m.p1)}</div>
              <div style="font-family:'Bebas Neue';font-size:28px;">${formatClockTime(clockData.time1)}</div>
              <div style="font-size:10px;opacity:0.5;">${clockData.moves1} moves</div>
            </div>
            <div style="text-align:center;padding:12px 20px;border:2px solid var(--black);background:var(--white);">
              <div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:0.5;">${esc(m.p2)}</div>
              <div style="font-family:'Bebas Neue';font-size:28px;">${formatClockTime(clockData.time2)}</div>
              <div style="font-size:10px;opacity:0.5;">${clockData.moves2} moves</div>
            </div>
          </div>` : ''}
          <div class="sep"></div>
          <label class="label">Who Won?</label>
          <div style="display:flex;flex-direction:column;gap:10px;margin-top:12px;">
            <button class="btn btn-primary btn-block" onclick="submitResult('p1')">♚ ${esc(m.p1)} WINS</button>
            ${allowDraw ? `<button class="btn btn-secondary btn-block" onclick="submitResult('draw')">½ DRAW</button>` : ''}
            <button class="btn btn-primary btn-block" onclick="submitResult('p2')">♚ ${esc(m.p2)} WINS</button>
          </div>
        </div>`;
        }

        function submitResult(result) {
            const rounds = getRounds(state.currentStage);
            const ri = state.currentRound;
            const mi = state.currentMatch;
            const m = rounds[ri].matches[mi];

            if (result === 'p1') m.winner = m.p1;
            else if (result === 'p2') m.winner = m.p2;
            else m.winner = 'DRAW';

            // Record time used from clock
            if (clockData) {
                m.time1Used = clockData.initial - clockData.time1;
                m.time2Used = clockData.initial - clockData.time2;
            }

            if (state.currentStage === 'playoff') advanceKnockout(ri, mi);
            checkGroupComplete();

            clockData = null;
            state.phase = 'fixtures';
            saveTourney();
            render();
        }

        /* ════════════════════════════════
           CHAMPION SCREEN
        ════════════════════════════════ */
        function renderChampion() {
            const isRR = state.format === 'roundrobin';

            if (isRR) {
                renderRRChampion();
                return;
            }

            // Knockout / Top2 / Top4: champion is final winner
            const finalRound = state.playoffRounds[state.playoffRounds.length - 1];
            const champ = finalRound ? finalRound.matches[0].winner : null;

            if (!champ || champ === 'DRAW') {
                state.phase = 'fixtures';
                saveTourney();
                render();
                return;
            }

            const qualifyCount = state.format === 'top2' ? 2 : (state.format === 'top3' ? 3 : (state.format === 'top4' ? 4 : 0));
            const hasPtsTable = state.format !== 'knockout';

            APP.innerHTML = `
        <div class="card" style="text-align:center;">
          <div class="trophy">🏆</div>
          <div class="screen-sub">TOURNAMENT CHAMPION</div>
          <div class="champion-name">${esc(champ)}</div>
          <div class="sep"></div>
          <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:0.5;margin-bottom:16px;">
            ${state.format.toUpperCase()} · ${state.timeMinutes}+${state.incrementSec} · ${state.players.length} PLAYERS
          </div>
          ${hasPtsTable ? `
            <div style="text-align:left;margin-bottom:16px;">
              <label class="label">Group Stage Standings</label>
              ${renderPointsTableHTML(qualifyCount)}
            </div>
          ` : ''}
          <div class="flex-row">
            <button class="btn btn-secondary" onclick="state.phase='fixtures';saveTourney();render();">VIEW BRACKET</button>
            <button class="btn btn-primary" onclick="onNewTourney()">NEW TOURNAMENT</button>
          </div>
        </div>`;
        }

        function renderRRChampion() {
            const standings = getSortedStandings();
            const champ = standings[0];

            APP.innerHTML = `
        <div class="card">
          <div class="trophy" style="text-align:center;">🏆</div>
          <div class="screen-title" style="text-align:center;">FINAL STANDINGS</div>
          <div class="champion-name" style="font-size:36px;">${esc(champ[0])}</div>
          <div class="sep"></div>
          <div class="scroll-area">${renderPointsTableHTML(0)}</div>
          <div class="sep"></div>
          <div class="flex-row">
            <button class="btn btn-secondary" onclick="state.phase='fixtures';saveTourney();render();">VIEW MATCHES</button>
            <button class="btn btn-primary" onclick="onNewTourney()">NEW TOURNAMENT</button>
          </div>
        </div>`;
        }

        function onNewTourney() {
            confirmDialog(
                'NEW TOURNAMENT',
                'Start a fresh tournament? Player names will be preserved for next time.',
                '♚',
                resetTourney
            );
        }

        /* ════════════════════════════════
           UTILITIES
        ════════════════════════════════ */
        function esc(s) {
            if (!s) return '';
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        /* ════════════════════════════════
           INIT & EVENT LISTENERS
        ════════════════════════════════ */
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
            } catch (e) { }
        }

        document.addEventListener('keydown', (e) => {
            if (state.phase === 'clock' && e.code === 'Space') {
                e.preventDefault();
                togglePause();
            }
        });

        window.addEventListener('beforeunload', (e) => {
            if (clockData && clockData.running) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // Boot
        render();
        if (state.phase === 'clock') {
            clockData = null;
            state.phase = 'fixtures';
            saveTourney();
            render();
        }
    </script>
</body>

</html>
