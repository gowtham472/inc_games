<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NONSENSE EXPERT</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --pink: #FF80AB;
            --indigo: #1A237E;
            --indigo-light: #283593;
            --black: #0A0A0A;
            --white: #FAFAFA;
            --cream: #FFF0F5;
            --border: 3px solid var(--black);
            --shadow: 6px 6px 0px var(--black);
            --shadow-lg: 10px 10px 0px var(--black);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--pink);
            background-image: radial-gradient(circle, rgba(0, 0, 0, 0.06) 1px, transparent 1px);
            background-size: 28px 28px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Mono', monospace;
            padding: 24px;
        }

        #app {
            width: 100%;
            max-width: 480px;
            position: relative;
        }

        .card {
            background: var(--cream);
            border: var(--border);
            box-shadow: var(--shadow-lg);
            padding: 40px 36px;
            position: relative;
            animation: slideIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pop {
            0% {
                transform: scale(0.7);
                opacity: 0;
            }

            70% {
                transform: scale(1.08);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .game-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 58px;
            line-height: 1;
            color: var(--cream);
            letter-spacing: 2px;
        }

        .game-title span {
            color: var(--pink);
        }

        .subtitle {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--pink);
            font-weight: 700;
            margin-top: 4px;
        }

        .header-bar {
            background: var(--indigo);
            margin: -40px -36px 32px;
            padding: 28px 36px 24px;
        }

        .form-group {
            margin-bottom: 20px;
            animation: fadeUp 0.4s ease both;
        }

        label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--black);
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            border: var(--border);
            background: var(--white);
            padding: 12px 16px;
            font-family: 'Space Mono', monospace;
            font-size: 15px;
            font-weight: 700;
            color: var(--black);
            outline: none;
            box-shadow: 4px 4px 0px var(--black);
            transition: box-shadow 0.15s, transform 0.15s;
            -moz-appearance: textfield;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
        }

        input:focus {
            box-shadow: 6px 6px 0px var(--indigo);
            transform: translate(-1px, -1px);
        }

        input::placeholder {
            color: rgba(0, 0, 0, 0.35);
            font-weight: 400;
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 3px;
            border: var(--border);
            cursor: pointer;
            transition: box-shadow 0.12s, transform 0.12s;
            display: block;
            text-align: center;
            text-decoration: none;
        }

        .btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--black) !important;
        }

        .btn-primary {
            background: var(--indigo);
            color: var(--cream);
            box-shadow: var(--shadow);
        }

        .btn-primary:hover {
            box-shadow: 8px 8px 0px var(--black);
            transform: translate(-2px, -2px);
        }

        .btn-pink {
            background: var(--pink);
            color: var(--black);
            box-shadow: var(--shadow);
        }

        .btn-pink:hover {
            box-shadow: 8px 8px 0px var(--black);
            transform: translate(-2px, -2px);
        }

        .btn-dark {
            background: var(--black);
            color: var(--pink);
            box-shadow: 6px 6px 0px var(--indigo);
        }

        .btn-dark:hover {
            box-shadow: 8px 8px 0px var(--indigo);
            transform: translate(-2px, -2px);
        }

        .btn-sm {
            font-size: 14px;
            padding: 10px 16px;
            letter-spacing: 2px;
        }

        .divider {
            border: none;
            border-top: 3px solid var(--black);
            margin: 24px 0;
        }

        .topic-card {
            background: var(--pink);
            border: var(--border);
            box-shadow: var(--shadow-lg);
            padding: 28px 24px;
            text-align: center;
            margin: 20px 0;
            animation: pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .topic-label {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(0, 0, 0, 0.5);
            margin-bottom: 8px;
        }

        .topic-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            color: var(--black);
            letter-spacing: 1px;
            line-height: 1.1;
        }

        .timer-box {
            background: var(--indigo);
            border: var(--border);
            box-shadow: var(--shadow);
            padding: 20px;
            text-align: center;
            margin: 16px 0;
        }

        .timer-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 72px;
            color: var(--pink);
            line-height: 1;
        }

        .timer-label {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 128, 171, 0.6);
            margin-top: 4px;
        }

        .timer-urgent .timer-num {
            color: #FF3D3D;
            animation: pulse 0.5s ease infinite;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border: 2px solid var(--black);
            background: var(--white);
            margin-bottom: 10px;
            font-size: 13px;
        }

        .info-row-label {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
        }

        .info-row-val {
            font-weight: 700;
        }

        .vote-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 16px 0;
        }

        .vote-btn {
            padding: 20px;
            text-align: center;
            border: var(--border);
            cursor: pointer;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 2px;
            transition: all 0.12s;
        }

        .vote-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--black);
        }

        .vote-btn:active {
            transform: translate(3px, 3px);
            box-shadow: none;
        }

        .vote-legit {
            background: var(--indigo);
            color: var(--cream);
        }

        .vote-fraud {
            background: var(--pink);
            color: var(--black);
        }

        .question-card {
            background: var(--white);
            border: var(--border);
            box-shadow: var(--shadow);
            padding: 20px;
            text-align: center;
            margin: 16px 0;
            animation: pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .question-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            color: var(--indigo);
            line-height: 1.15;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 14px;
            border: 2px solid var(--black);
            margin-bottom: 6px;
            font-size: 13px;
            background: var(--white);
            animation: fadeUp 0.3s ease both;
        }

        .score-name {
            font-weight: 700;
        }

        .score-pts {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            background: var(--indigo);
            color: var(--cream);
            padding: 2px 10px;
            border: 2px solid var(--black);
        }

        .player-badge {
            display: inline-block;
            background: var(--indigo);
            color: var(--cream);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            letter-spacing: 2px;
            padding: 6px 16px;
            border: 2px solid var(--black);
            box-shadow: 3px 3px 0px var(--black);
            margin-bottom: 8px;
        }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .center {
            text-align: center;
        }

        .mt-4 {
            margin-top: 16px;
        }

        .mb-3 {
            margin-bottom: 12px;
        }

        .home-link {
            display: inline-block;
            margin-bottom: 16px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--black);
            text-decoration: none;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .home-link:hover {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div id="app"></div>

    <script>
        const app = document.getElementById('app');
        const ico = (d, size = 16) =>
            `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:4px;">${d}</svg>`;
        const icons = {
            arrow: ico('<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>'),
            refresh: ico('<polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>'),
            home: ico('<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>'),
            brain: ico('<path d="M9.5 2A3.5 3.5 0 006 5.5c0 .32.04.63.13.92A3.5 3.5 0 003 9.5c0 1.28.69 2.4 1.71 3.01A3.49 3.49 0 004 14.5 3.5 3.5 0 007.5 18c.54 0 1.05-.12 1.5-.34V22h6v-4.34c.45.22.96.34 1.5.34a3.5 3.5 0 003.5-3.5c0-.71-.21-1.37-.58-1.92A3.49 3.49 0 0021 9.5a3.5 3.5 0 00-3.13-3.08c.08-.29.13-.6.13-.92A3.5 3.5 0 0014.5 2c-1.04 0-1.97.46-2.6 1.18A3.48 3.48 0 009.5 2z"/>'),
            trophy: ico('<path d="M6 9H4.5a2.5 2.5 0 010-5H6"/><path d="M18 9h1.5a2.5 2.5 0 000-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0012 0V2z"/>'),
            dice: ico('<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" stroke="none"/><circle cx="15.5" cy="15.5" r="1.5" fill="currentColor" stroke="none"/>'),
            mic: ico('<path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>'),
            check: ico('<polyline points="20 6 9 17 4 12"/>'),
            x: ico('<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>'),
            help: ico('<circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>'),
        };

        const topics = [
            "The history of invisible furniture",
            "How clouds are trained to make rain",
            "The mating rituals of traffic cones",
            "Why mirrors can actually see the future",
            "The underground economy of lint",
            "How shoelaces communicate with each other",
            "The science behind why Tuesdays feel weird",
            "Why elevators hum different songs on each floor",
            "The ancient art of competitive sleeping",
            "How refrigerators decide what to spoil first",
            "Why left socks disappear more than right ones",
            "The psychology of people who wave back at nobody",
            "How WiFi signals argue with each other",
            "The hidden language of car horns",
            "Why shadows sometimes walk faster than you",
            "The migration patterns of shopping carts",
            "How alarm clocks develop resentment",
            "The philosophical implications of bubble wrap",
            "Why pockets collect lint from other dimensions",
            "The secret meetings of autocorrect algorithms",
            "How gravity became unionized",
            "The emotional life of staplers",
            "Why waiting rooms exist in a parallel timeline",
            "How speed bumps reproduce",
            "The diplomatic relations between cats and gravity",
            "Why some chairs squeak and others remain silent",
            "The nutritional value of compliments",
            "How USB cables know which way is wrong",
            "The aerodynamics of poorly thrown frisbees",
            "Why escalators sometimes just become stairs",
        ];

        const audienceQuestions = [
            "Can you explain that in more detail?",
            "What are the common misconceptions about this?",
            "How was this first discovered?",
            "What's the most dangerous aspect of this?",
            "Can you give us a real-world example?",
            "What does the latest research say?",
            "How does this affect everyday life?",
            "What's the most surprising fact about this?",
            "Is there a cure or solution for this?",
            "How did you become an expert in this field?",
            "What do critics say about your theory?",
            "Can you explain it like I'm five?",
            "What's the future outlook for this topic?",
            "How does this compare internationally?",
            "What would happen if everyone knew about this?",
            "What's the biggest myth about this subject?",
            "How much money is involved in this industry?",
            "What's your most controversial opinion on this?",
            "Is there a connection to alien life?",
            "What keeps you up at night about this topic?",
        ];

        let state = 'setup';
        let playerNames = [];
        let playerCount = 4;
        let presentTime = 90;
        let scores = {};
        let currentExpertIdx = 0;
        let currentTopic = '';
        let timerVal = 0;
        let timerInterval = null;
        let roundNum = 1;
        let totalRounds = 2;
        let usedTopics = [];
        let votes = {};

        function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function getTopic() {
            const avail = topics.filter(t => !usedTopics.includes(t));
            if (avail.length === 0) usedTopics = [];
            const pool = avail.length > 0 ? avail : topics;
            const t = pool[Math.floor(Math.random() * pool.length)];
            usedTopics.push(t);
            return t;
        }

        function getRandomQuestion() {
            return audienceQuestions[Math.floor(Math.random() * audienceQuestions.length)];
        }

        function render() {
            stopTimer();
            app.innerHTML = '';
            const card = document.createElement('div');
            card.className = 'card';

            if (state === 'setup') {
                card.innerHTML = `
          <a href="index.html" class="home-link">${icons.home} ALL GAMES</a>
          <div class="header-bar">
            <div class="game-title">NONSENSE<br><span>EXPERT</span></div>
            <div class="subtitle">Fake it till they believe it</div>
          </div>
          <form id="setupForm">
            <div class="form-group">
              <label>Number of Players</label>
              <input required id="countInput" type="number" min="2" max="12" value="4" />
            </div>
            <div class="form-group">
              <label>Rounds (each player presents per round)</label>
              <input required id="roundsInput" type="number" min="1" max="4" value="2" />
            </div>
            <div class="form-group">
              <label>Presentation Time (seconds)</label>
              <input required id="timerInput" type="number" min="30" max="180" value="90" />
            </div>
            <button class="btn btn-primary" type="submit">ENTER PLAYER NAMES ${icons.arrow}</button>
          </form>
        `;
                app.appendChild(card);
                document.getElementById('setupForm').onsubmit = (e) => {
                    e.preventDefault();
                    playerCount = parseInt(document.getElementById('countInput').value, 10);
                    totalRounds = parseInt(document.getElementById('roundsInput').value, 10);
                    presentTime = parseInt(document.getElementById('timerInput').value, 10);
                    state = 'names';
                    render();
                };

            } else if (state === 'names') {
                card.innerHTML = `
          <div class="header-bar">
            <div class="game-title" style="font-size:48px;">PLAYER<br><span>NAMES</span></div>
          </div>
          <form id="nameForm">
            ${Array.from({ length: playerCount }, (_, i) => `
              <div class="form-group" style="animation-delay:${i * 0.05}s">
                <label>Player ${i + 1}</label>
                <input required type="text" class="nameField" placeholder="Enter name" autocomplete="off" value="Player ${i + 1}" />
              </div>
            `).join('')}
            <button class="btn btn-primary" type="submit">${icons.brain} START THE SHOW</button>
          </form>
        `;
                app.appendChild(card);
                document.getElementById('nameForm').onsubmit = (e) => {
                    e.preventDefault();
                    playerNames = [];
                    document.querySelectorAll('.nameField').forEach(f => playerNames.push(f.value.trim() || 'Player'));
                    scores = {};
                    playerNames.forEach(n => scores[n] = 0);
                    currentExpertIdx = 0;
                    roundNum = 1;
                    usedTopics = [];
                    state = 'topicReveal';
                    render();
                };

            } else if (state === 'topicReveal') {
                currentTopic = getTopic();
                const name = playerNames[currentExpertIdx];
                card.innerHTML = `
          <div class="header-bar">
            <div class="subtitle" style="color:var(--pink);">Round ${roundNum} &mdash; Expert ${currentExpertIdx + 1} of ${playerCount}</div>
            <div class="game-title" style="font-size:48px;">YOUR<br><span>TOPIC</span></div>
          </div>
          <div class="center mb-3">
            <div class="player-badge">${icons.mic} ${escapeHtml(name)}</div>
          </div>
          <div class="topic-card">
            <div class="topic-label">You are now an expert on</div>
            <div class="topic-text">${escapeHtml(currentTopic)}</div>
          </div>
          <p style="font-size:11px;opacity:0.5;text-align:center;margin-bottom:20px;line-height:1.5;">
            You have ${presentTime} seconds to present on this topic.<br>
            Sound as convincing as possible!
          </p>
          <button class="btn btn-primary" id="startBtn">${icons.mic} START PRESENTING ${icons.arrow}</button>
          <button class="btn btn-pink btn-sm mt-4" id="newTopicBtn">${icons.dice} DIFFERENT TOPIC</button>
        `;
                app.appendChild(card);
                document.getElementById('startBtn').onclick = () => { timerVal = presentTime; state = 'presenting'; render(); };
                document.getElementById('newTopicBtn').onclick = () => render();

            } else if (state === 'presenting') {
                const name = playerNames[currentExpertIdx];
                card.innerHTML = `
          <div class="header-bar">
            <div class="subtitle" style="color:var(--pink);">${escapeHtml(name)} is presenting</div>
            <div class="game-title" style="font-size:42px;">EXPERT<br><span>MODE</span></div>
          </div>
          <div class="topic-card" style="margin-top:0;padding:14px 18px;">
            <div class="topic-label">Topic</div>
            <div class="topic-text" style="font-size:22px;">${escapeHtml(currentTopic)}</div>
          </div>
          <div class="timer-box" id="timerBox">
            <div class="timer-num" id="timerDisplay">${timerVal}</div>
            <div class="timer-label">Seconds Remaining</div>
          </div>
          <div class="question-card" id="questionArea">
            <div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:0.5;margin-bottom:6px;">Audience Question</div>
            <div class="question-text" id="questionText">${escapeHtml(getRandomQuestion())}</div>
          </div>
          <button class="btn btn-pink btn-sm" id="newQuestionBtn">${icons.help} NEW QUESTION</button>
          <button class="btn btn-primary mt-4" id="endBtn">END &mdash; GO TO VOTE</button>
        `;
                app.appendChild(card);

                timerInterval = setInterval(() => {
                    timerVal--;
                    const display = document.getElementById('timerDisplay');
                    const box = document.getElementById('timerBox');
                    if (display) display.textContent = timerVal;
                    if (timerVal <= 10 && box) box.classList.add('timer-urgent');
                    if (timerVal <= 0) { stopTimer(); state = 'voting'; render(); }
                }, 1000);

                document.getElementById('newQuestionBtn').onclick = () => {
                    const qt = document.getElementById('questionText');
                    if (qt) qt.textContent = getRandomQuestion();
                    const qa = document.getElementById('questionArea');
                    if (qa) { qa.style.animation = 'none'; qa.offsetHeight; qa.style.animation = 'pop 0.35s cubic-bezier(0.34,1.56,0.64,1) both'; }
                };
                document.getElementById('endBtn').onclick = () => { stopTimer(); state = 'voting'; render(); };

            } else if (state === 'voting') {
                const name = playerNames[currentExpertIdx];
                card.innerHTML = `
          <div class="header-bar">
            <div class="game-title" style="font-size:48px;">AUDIENCE<br><span>VOTE</span></div>
            <div class="subtitle" style="color:var(--pink);">Was ${escapeHtml(name)} convincing?</div>
          </div>
          <div class="topic-card" style="padding:14px 18px;margin-top:0;">
            <div class="topic-text" style="font-size:18px;">${escapeHtml(currentTopic)}</div>
          </div>
          <p style="font-size:12px;opacity:0.6;text-align:center;margin-bottom:16px;">Everyone except the expert: vote now!</p>
          <div class="vote-grid">
            <div class="vote-btn vote-legit" id="voteLegit">
              ${icons.check}<br>LEGIT EXPERT
            </div>
            <div class="vote-btn vote-fraud" id="voteFraud">
              ${icons.x}<br>TOTAL FRAUD
            </div>
          </div>
          <div class="center" style="margin:12px 0;">
            <span style="font-size:12px;opacity:0.5;">Legit: <strong id="lCount">0</strong> &nbsp;|&nbsp; Fraud: <strong id="fCount">0</strong></span>
          </div>
          <button class="btn btn-primary mt-4" id="finalizeBtn">FINALIZE VOTES ${icons.arrow}</button>
        `;
                app.appendChild(card);

                let legit = 0, fraud = 0;
                document.getElementById('voteLegit').onclick = () => { legit++; document.getElementById('lCount').textContent = legit; };
                document.getElementById('voteFraud').onclick = () => { fraud++; document.getElementById('fCount').textContent = fraud; };
                document.getElementById('finalizeBtn').onclick = () => {
                    votes = { legit, fraud };
                    scores[playerNames[currentExpertIdx]] += legit;
                    state = 'voteResult';
                    render();
                };

            } else if (state === 'voteResult') {
                const name = playerNames[currentExpertIdx];
                const won = votes.legit > votes.fraud;
                card.innerHTML = `
          <div class="header-bar" style="background:${won ? 'var(--indigo)' : '#B71C1C'};">
            <div class="game-title" style="font-size:48px;">${won ? 'LEGIT' : 'TOTAL'}<br><span>${won ? 'EXPERT' : 'FRAUD'}</span></div>
            <div class="subtitle" style="color:${won ? 'var(--pink)' : '#ffcdd2'};">${escapeHtml(name)} ${won ? 'fooled the crowd!' : 'was exposed!'}</div>
          </div>
          <div class="two-col mb-3">
            <div class="info-row" style="margin:0;">
              <span class="info-row-label">Legit</span>
              <span class="info-row-val" style="color:var(--indigo);">${votes.legit}</span>
            </div>
            <div class="info-row" style="margin:0;">
              <span class="info-row-label">Fraud</span>
              <span class="info-row-val" style="color:#B71C1C;">${votes.fraud}</span>
            </div>
          </div>
          <div class="info-row">
            <span class="info-row-label">${escapeHtml(name)}'s Total Score</span>
            <span class="info-row-val">${scores[name]} pts</span>
          </div>
          <button class="btn btn-primary mt-4" id="nextBtn">${getNextLabel()}</button>
        `;
                app.appendChild(card);
                document.getElementById('nextBtn').onclick = () => {
                    currentExpertIdx++;
                    if (currentExpertIdx >= playerCount) {
                        currentExpertIdx = 0;
                        roundNum++;
                        if (roundNum > totalRounds) { state = 'gameover'; } else { state = 'topicReveal'; }
                    } else { state = 'topicReveal'; }
                    render();
                };

            } else if (state === 'gameover') {
                const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
                card.innerHTML = `
          <div class="header-bar">
            <div class="game-title" style="font-size:48px;">${icons.trophy} FINAL<br><span>RANKING</span></div>
            <div class="subtitle" style="color:var(--pink);">${escapeHtml(sorted[0][0])} is the ultimate BS artist!</div>
          </div>
          ${sorted.map((s, i) => `
            <div class="score-row" style="animation-delay:${i * 0.05}s;${i === 0 ? 'background:var(--pink);' : ''}">
              <span class="score-name">${i === 0 ? icons.trophy : ''} ${i + 1}. ${escapeHtml(s[0])}</span>
              <span class="score-pts">${s[1]}</span>
            </div>
          `).join('')}
          <hr class="divider">
          <button class="btn btn-primary" id="restartBtn">${icons.refresh} PLAY AGAIN</button>
          <a href="index.html" class="btn btn-dark mt-4">${icons.home} ALL GAMES</a>
        `;
                app.appendChild(card);
                try {
                    const hist = JSON.parse(localStorage.getItem('nonsense_history') || '[]');
                    hist.unshift({ winner: sorted[0][0], players: playerCount, rounds: totalRounds, date: new Date().toLocaleDateString() });
                    if (hist.length > 10) hist.length = 10;
                    localStorage.setItem('nonsense_history', JSON.stringify(hist));
                } catch (e) { }
                document.getElementById('restartBtn').onclick = () => { state = 'setup'; render(); };
            }
        }

        function getNextLabel() {
            if (currentExpertIdx + 1 < playerCount) return 'NEXT EXPERT ' + icons.arrow;
            if (roundNum < totalRounds) return 'NEXT ROUND ' + icons.arrow;
            return icons.trophy + ' FINAL RANKING';
        }

        render();
    </script>
</body>

</html>
